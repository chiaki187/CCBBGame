<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ccbbgame</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        img {
            width: 300px;
            margin-top: 20px;
        }

        #palette {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .color-box {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            text-align: center;
        }

        button {
            margin-top: 10px;
            margin-right: 10px;
        }


    <!--カメラ画面用-->
    .col {
        display: flex;
        flex-direction: column;
    }
    .row {
        display: flex;
        flex-direction: row;
    }
    #camera {
        width: 320px;
        height: 180px;
        transform: scaleX(-1);
    }
    #canvas, #overlay {
        width: 1280px;
        height: 720px;
        position: absolute;
        left: 0;
        top: 0;
    }
    #draw {
        position: relative;
    }
    </style>
  </head>
  <body>

    <!--初期画面-->
    <div id="firstView">
      <h1>通信を待っています</h1>
    </div>

    <!--ゲーム開始画面-->
    <div id="startgameView" style="display:none;">
      <h1>ゲームを始めます</h1>

      <input id="chatInput">
      <button id="sendButton">送信</button>
      <div id="chatArea"></div>


        <h1>Color Palette</h1>

      <!-- ファイル選択 -->
      <input type="file" id="fileInput" accept="image/*">
      <img id="img">

      <!-- ランダムカラーボタン -->
      <br> 
      <button id="randomBtn">ランダムカラー</button>

      <br>
      <div id="palette">
          <div class="color-box"></div>
          <div class="color-box"></div>
          <div class="color-box"></div>
          <div class="color-box"></div>
          <div class="color-box"></div>
          <div class="color-box"></div>
          <div class="color-box"></div>
          <div class="color-box"></div>
      </div>
    </div>


    <!--カメラ画面-->
    <div id="cameraView">
      <div id="app" class="col">
        <div id="cam" class="row">
          <div class="col">
            <video id="camera" width="320" height="180">
            </video>
            <div>video</div>
          </div>
        </div>
        <div id="draw">
          <canvas id="canvas" width="1280" height="720">
          </canvas>
          <canvas id="overlay" width="1280" height="720">
          </canvas>
        </div>
      </div>
    </div>
    
  </body>

  <script type="module" src="./src/js/color.js"></script>
  <script type="module" src="./src/main.js"></script>

</html>
