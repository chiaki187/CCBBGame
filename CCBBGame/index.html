<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ccbbgame</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        img {
            width: 300px;
            margin-top: 20px;
        }

        #palette, #opponent, #selected {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .color-box-me, .color-box-opponent, .color-box-selected {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            text-align: center;
        }

        button {
            margin-top: 10px;
            margin-right: 10px;
        }


    <!--カメラ画面用-->
    .col {
        display: flex;
        flex-direction: column;
    }
    .row {
        display: flex;
        flex-direction: row;
    }
    #camera {
        width: 100%;
        height:100%;
        transform: scaleX(-1);
    }
    #canvas, #overlay,#matterCanvas {
        width: 1280px;
        height: 720px;
        position: absolute;
        left: 0;
        top: 0;
    }
    #draw {
        position: relative;
    }
    </style>
  </head>
  <body>

    <!--初期画面-->
    <div id="firstView">
      <h1>通信を待っています</h1>
    </div>

    <!--ゲーム開始画面-->
    <div id="startgameView" style="display:none;">
      <h1>ゲームを始めます</h1>


      <h1>Color Palette</h1>

      <!-- ファイル選択 -->
      <input type="file" id="fileInput" accept="image/*">
      <img id="img">

      <!-- ランダムカラーボタン -->
      <br>
      <button id="randomBtn">ランダムカラー</button>

      <br>
      <div id="palette">
          <div class="color-box-me"></div>
          <div class="color-box-me"></div>
          <div class="color-box-me"></div>
          <div class="color-box-me"></div>
          <div class="color-box-me"></div>
          <div class="color-box-me"></div>
          <div class="color-box-me"></div>
          <div class="color-box-me"></div>
      </div>
      <br>
      <button id="decideBtn">決定</button>
      
      <h2>Opponent Color</h2>
      <div id="opponent">
        <div class="color-box-opponent"></div>
        <div class="color-box-opponent"></div>
        <div class="color-box-opponent"></div>
        <div class="color-box-opponent"></div>
        <div class="color-box-opponent"></div>
        <div class="color-box-opponent"></div>
        <div class="color-box-opponent"></div>
        <div class="color-box-opponent"></div>
      </div>
      <h2>Selected Color</h2>
      <div id="selected">
        <div class="color-box-selected"></div>
        <div class="color-box-selected"></div>
        <div class="color-box-selected"></div>
        <div class="color-box-selected"></div>
        <div class="color-box-selected"></div>
        <div class="color-box-selected"></div>
        <div class="color-box-selected"></div>
        <div class="color-box-selected"></div>
      </div>

      <div id="countDown"></div>
      <script type="module" src="/src/main.js"></script>

    </div>


    <!--カメラ画面-->
    <div id="cameraView" style="display:none;">
      <div class="col">
        <div id="cam" class="row">
          <div class="col">
          
            <div>video</div>
          </div>
        </div>
        <div id="draw">
          <canvas id="canvas" width="1280" height="720">
          </canvas>
          <video id="camera" width="1280" height="720">
            </video>
          <canvas id="overlay" width="1280" height="720">
          </canvas>
          <canvas id="matterCanvas"></canvas>
        </div>
      </div>
    </div>
    
  </body>

  <script type="module" src="./src/js/color.js"></script>
  <script type="module" src="./src/main.js"></script>

    
  </body>

</html>
